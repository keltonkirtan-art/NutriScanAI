<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriScan AI | Seu Nutricionista Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-emerald-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight"><i class="fas fa-leaf mr-2"></i>NutriScan AI</h1>
            <button class="bg-yellow-400 text-emerald-900 px-3 py-1 rounded-full text-sm font-bold hover:bg-yellow-300 transition">
                SEJA PRO
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-2xl">
        
        <section class="mb-8 text-center">
            <h2 class="text-2xl font-extrabold text-emerald-900">O que temos para hoje?</h2>
            <p class="text-gray-600">Digite seus ingredientes e deixe a IA cozinhar para você.</p>
        </section>

        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-gray-100">
            <div class="space-y-4">
                
                <div>
                    <label class="block text-sm font-semibold mb-1">Ingredientes na Geladeira:</label>
                    <textarea id="ingredientes" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none" rows="3" placeholder="Ex: 2 ovos, frango, espinafre, tomate..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">Seu Objetivo:</label>
                    <select id="objetivo" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                        <option value="emagrecimento">Emagrecimento</option>
                        <option value="hipertrofia">Hipertrofia (Ganho de Massa)</option>
                        <option value="manutencao">Manutenção / Saúde</option>
                        <option value="performance">Performance Esportiva</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">Restrições Alimentares:</label>
                    <input type="text" id="restricoes" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="Ex: Sem glúten, Vegano, Sem lactose...">
                </div>

                <button onclick="gerarReceita()" id="btn-gerar" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl hover:bg-emerald-700 transition transform active:scale-95 shadow-md">
                    GERAR RECEITA COM IA
                </button>

            </div>
        </div>

        <div id="resultado-area" class="hidden space-y-4">
            <div class="bg-white rounded-2xl shadow-md p-6 border-l-4 border-emerald-500">
                <div id="loading" class="text-center py-4 hidden">
                    <i class="fas fa-circle-notch fa-spin text-emerald-500 text-2xl"></i>
                    <p class="mt-2 text-sm text-gray-500">Criando sua receita personalizada...</p>
                </div>
                <div id="conteudo-receita" class="prose prose-emerald max-w-none">
                    </div>
                <div class="mt-4 flex gap-2">
                    <button onclick="baixarPDF()" class="flex-1 bg-gray-800 text-white py-2 rounded-lg font-bold text-sm hover:bg-black transition">
                        <i class="fas fa-file-pdf mr-2"></i> BAIXAR PDF
                    </button>
                </div>
            </div>

            <div class="bg-emerald-900 text-white p-6 rounded-2xl flex items-center justify-between">
                <div>
                    <h3 class="font-bold">Gostou da sugestão?</h3>
                    <p class="text-xs text-emerald-200">Gere um cardápio para a semana toda e receba a lista de compras!</p>
                </div>
                <button class="bg-emerald-500 p-2 rounded-lg font-bold text-sm">Ver Plano</button>
            </div>
        </div>

    </main>

    <script>
        async function gerarReceita() {
            const area = document.getElementById('resultado-area');
            const loading = document.getElementById('loading');
            const conteudo = document.getElementById('conteudo-receita');
            const btn = document.getElementById('btn-gerar');
            
            // Pegando os valores dos campos
            const ingredientes = document.getElementById('ingredientes').value;
            const objetivo = document.getElementById('objetivo').value;
            const restricoes = document.getElementById('restricoes').value;

            if (!ingredientes) {
                alert("Por favor, digite os ingredientes que você tem!");
                return;
            }

            // UI Feedback
            area.classList.remove('hidden');
            loading.classList.remove('hidden');
            conteudo.innerHTML = "";
            btn.disabled = true; // Evita cliques múltiplos

            try {
                const response = await fetch('/gerar-receita', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ingredientes, objetivo, restricoes })
                });

                const data = await response.json();

                if (data.receita) {
                    // A IA já retorna HTML formatado conforme pedimos no prompt
                    loading.classList.add('hidden');
                    conteudo.innerHTML = data.receita;
                } else {
                    throw new Error(data.error || "Erro desconhecido");
                }
            } catch (error) {
                loading.classList.add('hidden');
                conteudo.innerHTML = `<p class="text-red-500">Erro ao gerar: ${error.message}</p>`;
            } finally {
                btn.disabled = false;
            }
        }
        function baixarPDF() {
            const elemento = document.getElementById('conteudo-receita');
            const opt = {
                margin: 10,
                filename: 'meu-plano-nutriscan.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(elemento).save();
        }
    </script>
</body>
</html>
